<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
</head>
<body style = "background : #212121; color:#fff; ">
    <ul class="language">
        <li>JavaScript</li>
    </ul>
</body>
<script>

    // this is used to add element in DOM model 
    function addlanguage(langname){
        const li = document.createElement('li')
        li.innerHTML=`${langname}`
        document.querySelector('.language').appendChild(li)
    }
    addlanguage('Python')
    addlanguage('Java')



    // this is optimal way to add the Element
    function addoptilanguage(language){
        const li = document.createElement('li');
        li.appendChild(document.createTextNode(language))
        document.querySelector('.language').appendChild(li)
    }
    addoptilanguage('Python')
    addoptilanguage('Java')



    //EDIT THE ELEMENT
    const secondlang = document.querySelector('li:nth-child(2)')
    console.log(secondlang);
    // secondlang.innerHTML = "Mojo"
    const newli = document.createElement('li')
    newli.textContent = 'PHP'
    secondlang.replaceWith(newli)

    //EDIT THE ELEMENT with optimised approach
    const secondlang = document.querySelector('li:nth-child(2)')
    const newli = document.createElement('li')
    newli.appendChild(document.createTextNode('PHP'))
    secondlang.replaceWith(newli)

    //Edit
    const firstlang = document.querySelector('li:first-child')
    firstlang.outerHTML = `<li>TypeScript</li>`


    //remove
    const lastlanguage = document.querySelector('li:last-child')
    lastlanguage.remove()
</script>
</html>
