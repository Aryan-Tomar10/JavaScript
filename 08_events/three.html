<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Aryan Tomar</h1>
    <button id="start">Start</button>
    <button id="stop">Stop</button>
</body>
<script>
    //this is the format of using third parameter in the set Interval

    //i want that change me should not start without clicking on the start button

    const saydate = function (str){
        console.log(str,Date.now());
        
    }

    let changeme = null;

    document.querySelector('#start').addEventListener('click',function(){
        if (!changeme){
            changeme = setInterval(saydate,1000,'hi')
            console.log("Started")
        }
    });
    
    document.querySelector('#stop').addEventListener('click',function(){
        clearInterval(changeme);
        changeme = null
        console.log("Stopped")
    });
</script>
</html>
